name: Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment_name:
        description: Environment (dev / stg / qa / prod)
        required: true
        default: stg
        type: choice
        options:
          - dev
          - stg
          - qa
          - prod
concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.event.inputs.environment_name || 'stg' }}
  cancel-in-progress: false
jobs:
  set-env:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      image: ${{ steps.set-env.outputs.image }}
      image_tag: ${{ steps.set-env.outputs.image_tag }}
    steps:
      - id: set-env
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment_name }}"
          else
            ENV="stg"
          fi
          IMAGE_TAG="${{ github.sha }}"
          IMAGE="${{ vars._AR_HOSTNAME }}/${{ vars.PROJECT_ID }}/server/server:${IMAGE_TAG}"
          echo "environment=$ENV" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    needs:
      - set-env
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.PROJECT_ID }}
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ vars._AR_HOSTNAME }}
      - name: Build server image (multi-binary)
        run: docker build -t ${{ needs.set-env.outputs.image }} -f Dockerfile .
      - name: Push server image
        run: docker push ${{ needs.set-env.outputs.image }}

  terraform-apply:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: ${{ needs.set-env.outputs.environment }}
    needs:
      - set-env
      - build-and-push
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
      - uses: jdx/mise-action@v3
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.SERVICE_ACCOUNT }}
      - name: Terraform init
        run: terraform init -input=false
      - name: Terraform apply
        run: |
          terraform apply \
            -input=false \
            -auto-approve \
            -var-file=envs/${{ needs.set-env.outputs.environment }}.tfvars \
            -var=image_tag=${{ needs.set-env.outputs.image_tag }}

  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: ${{ needs.set-env.outputs.environment }}
    needs:
      - set-env
      - terraform-apply
    steps:
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.PROJECT_ID }}
      - name: Determine migrate-job name
        id: name
        shell: bash
        run: |
          ENV="${{ needs.set-env.outputs.environment }}"
          if [ "$ENV" = "prod" ]; then
            JOB="migrate-job"
          else
            JOB="migrate-job-$ENV"
          fi
          echo "job=$JOB" >> "$GITHUB_OUTPUT"
      - name: Execute migrate-job
        run: |
          gcloud run jobs execute ${{ steps.name.outputs.job }} \
            --region ${{ vars._DEPLOY_REGION }} \
            --wait
