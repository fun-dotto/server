name: Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment_name:
        description: Environment (dev / stg / qa / prod)
        required: true
        default: dev
        type: choice
        options:
          - dev
          - stg
          - qa
          - prod
concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.event.inputs.environment_name || 'dev' }}
  cancel-in-progress: false
jobs:
  set-env:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # push to main は dev に固定。prod へは workflow_dispatch で environment_name=prod を
    # 明示した場合のみ到達する (本ジョブで ENV を決定し、後続ジョブの environment: に伝搬する)。
    # vars._AR_HOSTNAME / vars.PROJECT_ID を環境スコープで解決させるため、本ジョブにも
    # environment: を指定する。
    environment: ${{ github.event.inputs.environment_name || 'dev' }}
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      image: ${{ steps.set-env.outputs.image }}
      image_tag: ${{ steps.set-env.outputs.image_tag }}
      migrate_job: ${{ steps.set-env.outputs.migrate_job }}
    steps:
      - id: set-env
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENVIRONMENT: ${{ github.event.inputs.environment_name }}
          COMMIT_SHA: ${{ github.sha }}
          AR_HOSTNAME: ${{ vars._AR_HOSTNAME }}
          PROJECT_ID: ${{ vars.PROJECT_ID }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            ENV="$INPUT_ENVIRONMENT"
          else
            ENV="dev"
          fi
          IMAGE_TAG="$COMMIT_SHA"
          IMAGE="${AR_HOSTNAME}/${PROJECT_ID}/server/server:${IMAGE_TAG}"
          if [ "$ENV" = "prod" ]; then
            MIGRATE_JOB="migrate-job"
          else
            MIGRATE_JOB="migrate-job-$ENV"
          fi
          echo "environment=$ENV" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "migrate_job=$MIGRATE_JOB" >> "$GITHUB_OUTPUT"

  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    needs:
      - set-env
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.PROJECT_ID }}
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ vars._AR_HOSTNAME }}
      - name: Build server image (multi-binary)
        run: docker build -t ${{ needs.set-env.outputs.image }} -f Dockerfile .
      - name: Push server image
        run: docker push ${{ needs.set-env.outputs.image }}

  # フェーズ1: Cloud Run Jobs (migrate-job 含む) だけを新イメージに更新する。
  # Service はまだ古いまま → 新コードに対して migration を先に走らせるため。
  terraform-apply-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    environment: ${{ needs.set-env.outputs.environment }}
    needs:
      - set-env
      - build-and-push
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v3
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.SERVICE_ACCOUNT }}
      - name: Terraform init
        run: terraform init -input=false -backend-config=envs/${{ needs.set-env.outputs.environment }}.backend.hcl
      - name: Terraform plan (Cloud Run Jobs only)
        run: |
          terraform plan \
            -input=false \
            -no-color \
            -target='google_cloud_run_v2_job.jobs' \
            -var-file=envs/${{ needs.set-env.outputs.environment }}.tfvars \
            -var=image_tag=${{ needs.set-env.outputs.image_tag }} \
            -out=tfplan-jobs.binary
      - name: Terraform apply (Cloud Run Jobs only)
        run: terraform apply -input=false -auto-approve tfplan-jobs.binary

  # フェーズ2: Job の新イメージで migration を実行する。
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    environment: ${{ needs.set-env.outputs.environment }}
    needs:
      - set-env
      - terraform-apply-jobs
    steps:
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.PROJECT_ID }}
      - name: Execute migrate-job
        run: |
          gcloud run jobs execute ${{ needs.set-env.outputs.migrate_job }} \
            --region ${{ vars._DEPLOY_REGION }} \
            --wait

  # フェーズ3: migration 成功後に Cloud Run Service を新イメージへ切り替える。
  # フェーズ1 の -target で残った差分はここで全て当たる (Service / Scheduler 含む)。
  terraform-apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    environment: ${{ needs.set-env.outputs.environment }}
    needs:
      - set-env
      - migrate
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v3
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.SERVICE_ACCOUNT }}
      - name: Terraform init
        run: terraform init -input=false -backend-config=envs/${{ needs.set-env.outputs.environment }}.backend.hcl
      - name: Terraform plan
        run: |
          terraform plan \
            -input=false \
            -no-color \
            -var-file=envs/${{ needs.set-env.outputs.environment }}.tfvars \
            -var=image_tag=${{ needs.set-env.outputs.image_tag }} \
            -out=tfplan.binary
      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan.binary
