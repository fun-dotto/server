name: Terraform Plan
on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/tf-plan.yml"
concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  plan:
    # fork PR からは `pull-requests: write` が降りず PR コメント投稿が失敗するため、
    # 同一リポジトリの PR (= 本リポジトリは fork を受け付けない前提) のみ実行する。
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v3
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.SERVICE_ACCOUNT }}
      - name: Terraform init
        run: terraform init -input=false -backend-config=envs/stg.backend.hcl
      - name: Terraform fmt check
        run: terraform fmt -check -recursive
      - name: Terraform validate
        run: terraform validate
      - name: Terraform plan
        id: plan
        # image_tag は deploy.yml 側で commit SHA を渡す。PR plan で SHA を渡すと毎 commit で
        # image_tag だけの差分が常に出てしまい本来見たい infra 差分が埋もれるため、
        # variables.tf の default ("latest") を採用して plan ノイズを抑える。
        run: |
          set +e
          terraform plan \
            -input=false \
            -no-color \
            -detailed-exitcode \
            -var-file=envs/stg.tfvars \
            -out=tfplan.binary > tfplan.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          tail -n 500 tfplan.txt > tfplan.summary.txt
      - uses: actions/github-script@v8
        env:
          PLAN_SUMMARY_PATH: infra/tfplan.summary.txt
        with:
          script: |
            const fs = require('fs');
            // PR に同 plan コメントを毎 push で累積させないため、marker でコメントを
            // 同定して upsert する。
            const marker = '<!-- terraform-plan:envs/stg.tfvars -->';
            let summary = '(no output)';
            try {
              summary = fs.readFileSync(process.env.PLAN_SUMMARY_PATH, 'utf8') || summary;
            } catch (_) {}
            const body = [
              marker,
              "### Terraform Plan (envs/stg.tfvars)",
              "",
              "<details><summary>plan output (tail)</summary>",
              "",
              "```",
              summary,
              "```",
              "",
              "</details>",
            ].join("\n");
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const existing = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const prior = existing.find((c) => c.body && c.body.includes(marker));
            if (prior) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: prior.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
      - name: Fail on plan error
        if: steps.plan.outputs.exit_code != '0' && steps.plan.outputs.exit_code != '2'
        run: exit 1
