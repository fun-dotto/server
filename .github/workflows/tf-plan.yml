name: Terraform Plan
on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/tf-plan.yml"
concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  plan:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v3
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.SERVICE_ACCOUNT }}
      - name: Terraform init
        run: terraform init -input=false -backend-config=envs/stg.backend.hcl
      - name: Terraform fmt check
        run: terraform fmt -check -recursive
      - name: Terraform validate
        run: terraform validate
      - name: Terraform plan
        id: plan
        run: |
          set +e
          terraform plan \
            -input=false \
            -no-color \
            -detailed-exitcode \
            -var-file=envs/stg.tfvars \
            -var=image_tag=${{ github.sha }} \
            -out=tfplan.binary > tfplan.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          tail -c 60000 tfplan.txt > tfplan.summary.txt
      - uses: actions/github-script@v8
        env:
          PLAN_SUMMARY_PATH: infra/tfplan.summary.txt
        with:
          script: |
            const fs = require('fs');
            let summary = '(no output)';
            try {
              summary = fs.readFileSync(process.env.PLAN_SUMMARY_PATH, 'utf8') || summary;
            } catch (_) {}
            const body = [
              "### Terraform Plan (envs/stg.tfvars)",
              "",
              "```",
              summary,
              "```",
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
      - name: Fail on plan error
        if: steps.plan.outputs.exit_code != '0' && steps.plan.outputs.exit_code != '2'
        run: exit 1
