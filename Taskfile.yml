version: "3"

vars:
  GO: go

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  setup:
    desc: Install pinned tools and download Go module dependencies
    cmds:
      - mise install
      - "{{.GO}} mod download"

  install:
    desc: Sync go.mod / go.sum
    cmds:
      - "{{.GO}} mod tidy"

  generate:academic:
    desc: Generate academic API server code from OpenAPI spec
    cmds:
      - rm -rf ./gen/academic
      - mkdir -p ./gen/academic
      - oapi-codegen -config ./api/openapi/academic/config.yaml ./api/openapi/academic/openapi.yaml

  build:
    desc: Build all binaries under cmd/
    cmds:
      - rm -rf ./bin
      - mkdir -p ./bin
      - "{{.GO}} build -tags timetzdata -trimpath -ldflags='-s -w' -o ./bin/academic-api ./cmd/academic-api"
      - "{{.GO}} build -tags timetzdata -trimpath -ldflags='-s -w' -o ./bin/build-class-change-notifications-job ./cmd/build-class-change-notifications-job"
      - "{{.GO}} build -tags timetzdata -trimpath -ldflags='-s -w' -o ./bin/dispatch-notifications-job ./cmd/dispatch-notifications-job"
      - "{{.GO}} build -tags timetzdata -trimpath -ldflags='-s -w' -o ./bin/migrate-job ./cmd/migrate-job"

  test:
    desc: Run all unit tests
    cmds:
      - "{{.GO}} test -v ./..."

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf ./bin

  migrate:diff:
    desc: Generate a new versioned migration from the GORM models. Usage - task migrate:diff -- <name>
    dotenv:
      - .env
    cmds:
      - atlas migrate diff {{.CLI_ARGS}} --env local

  migrate:apply:local:
    desc: Apply migrations against a locally-running PostgreSQL (DEV_DATABASE_URL must be set)
    dotenv:
      - .env
    cmds:
      - atlas migrate apply --env local --url "$DEV_DATABASE_URL"
