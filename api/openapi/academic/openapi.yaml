  /v1/subjects:
    get:
      operationId: SubjectsV1_list
      description: |-
        科目一覧を取得する

        同一項目同士はOR、異なる項目同士はANDでフィルタリングされます。
      parameters:
        - name: ids
          in: query
          required: false
          description: 科目IDのリスト; 指定した場合は指定した科目IDのみを取得する
          schema:
            type: array
            items:
              type: string
          explode: false
        - name: q
          in: query
          required: false
          description: 検索ワード
          schema:
            type: string
          explode: false
        - name: grades
          in: query
          required: false
          description: 学年
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DottoFoundationV1.Grade'
          explode: false
        - name: courses
          in: query
          required: false
          description: コース; 大学院の場合は大学院コースに読み替え
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DottoFoundationV1.Course'
          explode: false
        - name: classes
          in: query
          required: false
          description: クラス; 大学院の学年を選択した場合は選択できない
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DottoFoundationV1.Class'
          explode: false
        - name: classifications
          in: query
          required: false
          description: '学部: 専門・教養; 大学院: 専門・研究指導'
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DottoFoundationV1.SubjectClassification'
          explode: false
        - name: year
          in: query
          required: false
          description: 開講年度; 指定しない場合は今年度が選択される
          schema:
            type: integer
          explode: false
        - name: semesters
          in: query
          required: false
          description: 開講時期
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DottoFoundationV1.CourseSemester'
          explode: false
        - name: requirementTypes
          in: query
          required: false
          description: 必修・選択・選択必修
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DottoFoundationV1.SubjectRequirementType'
          explode: false
        - name: culturalSubjectCategories
          in: query
          required: false
          description: 教養科目カテゴリ
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DottoFoundationV1.CulturalSubjectCategory'
          explode: false
      responses:
        '200':
          description: 科目のリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  subjects:
                    type: array
                    items:
                      $ref: '#/components/schemas/Subject'
                required:
                  - subjects
      tags:
        - Subjects
  /v1/subjects/{id}:
    get:
      operationId: SubjectsV1_detail
      description: 科目を詳細取得する
      parameters:
        - name: id
          in: path
          required: true
          description: 科目ID
          schema:
            type: string
      responses:
        '200':
          description: 科目の詳細
          content:
            application/json:
              schema:
                type: object
                properties:
                  subject:
                    $ref: '#/components/schemas/Subject'
                required:
                  - subject
        '404':
          description: The server cannot find the requested resource.
      tags:
        - Subjects
    delete:
      operationId: SubjectsV1_delete
      description: 科目を削除する
      parameters:
        - name: id
          in: path
          required: true
          description: 科目ID
          schema:
            type: string
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
        '404':
          description: The server cannot find the requested resource.
      tags:
        - Subjects
  /v1/subjects/{id}/syllabus:
    get:
      operationId: SyllabusV1_detail
      description: シラバスを取得する
      parameters:
        - name: id
          in: path
          required: true
          description: 科目ID
          schema:
            type: string
      responses:
        '200':
          description: シラバス
          content:
            application/json:
              schema:
                type: object
                properties:
                  syllabus:
                    $ref: '#/components/schemas/Syllabus'
                required:
                  - syllabus
        '404':
          description: The server cannot find the requested resource.
      tags:
        - Syllabus
  /v1/timetableItems:
    get:
      operationId: TimetableItemsV1_list
      description: 時間割を取得する
      parameters:
        - name: year
          in: query
          required: false
          description: 開講年度; 指定しない場合は今年度が選択される
          schema:
            type: integer
          explode: false
        - name: semesters
          in: query
          required: true
          description: 開講時期; 指定された時期に開講される全ての科目が取得される
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DottoFoundationV1.CourseSemester'
          explode: false
      responses:
        '200':
          description: 時間割のリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  timetableItems:
                    type: array
                    items:
                      $ref: '#/components/schemas/TimetableItem'
                required:
                  - timetableItems
      tags:
        - TimetableItems
    post:
      operationId: TimetableItemsV1_create
      description: 時間割に追加する
      parameters: []
      responses:
        '201':
          description: 作成された時間割
          content:
            application/json:
              schema:
                type: object
                properties:
                  timetableItem:
                    $ref: '#/components/schemas/TimetableItem'
                required:
                  - timetableItem
      tags:
        - TimetableItems
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TimetableItemRequest'
        description: 追加する時間割の情報
  /v1/timetableItems/{id}:
    delete:
      operationId: TimetableItemsV1_delete
      description: 時間割を削除する
      parameters:
        - name: id
          in: path
          required: true
          description: 時間割ID
          schema:
            type: string
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
        '404':
          description: The server cannot find the requested resource.
      tags:
        - TimetableItems
components:
  schemas:
    CancelledClass:
      type: object
      required:
        - id
        - subject
        - date
        - period
        - comment
      properties:
        id:
          type: string
        subject:
          $ref: '#/components/schemas/Subject'
        date:
          type: string
          format: date
        period:
          $ref: '#/components/schemas/DottoFoundationV1.Period'
        comment:
          type: string
      description: 休講
    CancelledClassRequest:
      type: object
      required:
        - subjectId
        - date
        - period
        - comment
      properties:
        subjectId:
          type: string
        date:
          type: string
          format: date
        period:
          $ref: '#/components/schemas/DottoFoundationV1.Period'
        comment:
          type: string
    CourseRegistration:
      type: object
      required:
        - id
        - userId
        - subject
      properties:
        id:
          type: string
        userId:
          type: string
        subject:
          $ref: '#/components/schemas/Subject'
    CourseRegistrationRequest:
      type: object
      required:
        - userId
        - subjectId
      properties:
        userId:
          type: string
        subjectId:
          type: string
    DottoFoundationV1.Class:
      type: string
      enum:
        - A
        - B
        - C
        - D
        - E
        - F
        - G
        - H
        - I
        - J
        - K
        - L
      description: クラス
    DottoFoundationV1.Course:
      type: string
      enum:
        - InformationSystem
        - InformationDesign
        - AdvancedICT
        - ComplexSystem
        - IntelligentSystem
      description: コース
    DottoFoundationV1.CourseSemester:
      type: string
      enum:
        - AllYear
        - H1
        - H2
        - Q1
        - Q2
        - Q3
        - Q4
        - SummerIntensive
        - WinterIntensive
      description: 開講時期
    DottoFoundationV1.CulturalSubjectCategory:
      type: string
      enum:
        - Society
        - Human
        - Science
        - Health
        - Communication
      description: 教養科目カテゴリ
    DottoFoundationV1.DayOfWeek:
      type: string
      enum:
        - Sunday
        - Monday
        - Tuesday
        - Wednesday
        - Thursday
        - Friday
        - Saturday
    DottoFoundationV1.Floor:
      type: string
      enum:
        - Floor1
        - Floor2
        - Floor3
        - Floor4
        - Floor5
        - Floor6
        - Floor7
        - Virtual
    DottoFoundationV1.Grade:
      type: string
      enum:
        - B1
        - B2
        - B3
        - B4
        - M1
        - M2
        - D1
        - D2
        - D3
      description: 学年
    DottoFoundationV1.Period:
      type: string
      enum:
        - Period1
        - Period2
        - Period3
        - Period4
        - Period5
        - Period6
    DottoFoundationV1.PersonalCalendarItemStatus:
      type: string
      enum:
        - Normal
        - Cancelled
        - Makeup
        - RoomChanged
      description: 教室変更よりも休講・補講が優先される
    DottoFoundationV1.SubjectClassification:
      type: string
      enum:
        - Specialized
        - Cultural
        - ResearchInstruction
      description: 科目カテゴリ
    DottoFoundationV1.SubjectRequirementType:
      type: string
      enum:
        - Required
        - Optional
        - OptionalRequired
      description: 必修・選択
    DottoFoundationV1.TimetableSlot:
      type: object
      required:
        - dayOfWeek
        - period
      properties:
        dayOfWeek:
          $ref: '#/components/schemas/DottoFoundationV1.DayOfWeek'
        period:
          $ref: '#/components/schemas/DottoFoundationV1.Period'
    Faculty:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
    FacultyRequest:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
        email:
          type: string
    MakeupClass:
      type: object
      required:
        - id
        - subject
        - date
        - period
        - comment
      properties:
        id:
          type: string
        subject:
          $ref: '#/components/schemas/Subject'
        date:
          type: string
          format: date
        period:
          $ref: '#/components/schemas/DottoFoundationV1.Period'
        comment:
          type: string
      description: 補講
    MakeupClassRequest:
      type: object
      required:
        - subjectId
        - date
        - period
        - comment
      properties:
        subjectId:
          type: string
        date:
          type: string
          format: date
        period:
          $ref: '#/components/schemas/DottoFoundationV1.Period'
        comment:
          type: string
    PersonalCalendarItem:
      type: object
      required:
        - date
        - period
        - subject
        - rooms
        - status
      properties:
        date:
          type: string
          format: date
        period:
          $ref: '#/components/schemas/DottoFoundationV1.Period'
        subject:
          $ref: '#/components/schemas/Subject'
        rooms:
          type: array
          items:
            $ref: '#/components/schemas/Room'
        status:
          $ref: '#/components/schemas/DottoFoundationV1.PersonalCalendarItemStatus'
    Reservation:
      type: object
      required:
        - id
        - roomId
        - startAt
        - endAt
        - title
      properties:
        id:
          type: string
        roomId:
          type: string
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        title:
          type: string
    ReservationRequest:
      type: object
      required:
        - roomId
        - startAt
        - endAt
        - title
      properties:
        roomId:
          type: string
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        title:
          type: string
    Room:
      type: object
      required:
        - id
        - name
        - number
        - floor
      properties:
        id:
          type: string
        name:
          type: string
          description: 部屋名
        number:
          type: string
          description: |-
            部屋番号

            部屋番号が存在しない場合は空文字
        floor:
          allOf:
            - $ref: '#/components/schemas/DottoFoundationV1.Floor'
          description: |-
            フロア

            オンラインなどの仮想教室の場合はVirtualを使用
        faculty:
          allOf:
            - $ref: '#/components/schemas/Faculty'
          description: |-
            教員

            教員室でない場合は省略
    RoomChange:
      type: object
      required:
        - id
        - subject
        - date
        - period
        - originalRoom
        - newRoom
      properties:
        id:
          type: string
        subject:
          $ref: '#/components/schemas/Subject'
        date:
          type: string
          format: date
        period:
          $ref: '#/components/schemas/DottoFoundationV1.Period'
        originalRoom:
          $ref: '#/components/schemas/Room'
        newRoom:
          $ref: '#/components/schemas/Room'
      description: 教室変更
    RoomChangeRequest:
      type: object
      required:
        - subjectId
        - date
        - period
        - originalRoomId
        - newRoomId
      properties:
        subjectId:
          type: string
        date:
          type: string
          format: date
        period:
          $ref: '#/components/schemas/DottoFoundationV1.Period'
        originalRoomId:
          type: string
        newRoomId:
          type: string
    RoomRequest:
      type: object
      required:
        - name
        - floor
      properties:
        name:
          type: string
        floor:
          $ref: '#/components/schemas/DottoFoundationV1.Floor'
        facultyId:
          type: string
    Subject:
      type: object
      required:
        - id
        - name
        - faculties
        - year
        - semester
        - credit
      properties:
        id:
          type: string
        name:
          type: string
        faculties:
          type: array
          items:
            $ref: '#/components/schemas/SubjectFaculty'
        year:
          type: integer
          description: 開講年度
        semester:
          allOf:
            - $ref: '#/components/schemas/DottoFoundationV1.CourseSemester'
          description: 開講時期
        credit:
          type: integer
          description: 単位数
        eligibleAttributes:
          type: array
          items:
            $ref: '#/components/schemas/SubjectTargetClass'
          description: |-
            授業名末尾の`学年-クラス`をもとに決定

            科目詳細取得でのみ必須
        requirements:
          type: array
          items:
            $ref: '#/components/schemas/SubjectRequirement'
          description: |-
            科目群・科目区分をもとに決定

            科目詳細取得でのみ必須
    SubjectFaculty:
      type: object
      required:
        - faculty
        - isPrimary
      properties:
        faculty:
          $ref: '#/components/schemas/Faculty'
        isPrimary:
          type: boolean
    SubjectFacultyRequest:
      type: object
      required:
        - facultyId
        - isPrimary
      properties:
        facultyId:
          type: string
        isPrimary:
          type: boolean
    SubjectRequirement:
      type: object
      required:
        - course
        - requirementType
      properties:
        course:
          $ref: '#/components/schemas/DottoFoundationV1.Course'
        requirementType:
          $ref: '#/components/schemas/DottoFoundationV1.SubjectRequirementType'
    SubjectRequirementRequest:
      type: object
      required:
        - course
        - requirementType
      properties:
        course:
          $ref: '#/components/schemas/DottoFoundationV1.Course'
        requirementType:
          $ref: '#/components/schemas/DottoFoundationV1.SubjectRequirementType'
    SubjectTargetClass:
      type: object
      required:
        - grade
      properties:
        grade:
          $ref: '#/components/schemas/DottoFoundationV1.Grade'
        class:
          allOf:
            - $ref: '#/components/schemas/DottoFoundationV1.Class'
          description: 修士課程・博士課程対象の場合はnull
      description: 対象学年・クラス
    Syllabus:
      type: object
      required:
        - id
        - name
        - enName
        - grades
        - credit
        - facultyNames
        - practicalHomeFacultyCategory
        - multiplePersonTeachingForm
        - teachingForm
        - summary
        - learningOutcomes
        - assignments
        - evaluationMethod
        - textbooks
        - referenceBooks
        - prerequisites
        - preLearning
        - postLearning
        - notes
        - keywords
        - targetCourses
        - targetAreas
        - classifications
        - teachingLanguage
        - contentsAndSchedule
        - teachingAndExamForm
        - dsopSubject
      properties:
        id:
          type: string
          description: 教務システムのシラバスID
        name:
          type: string
          description: 授業名
        enName:
          type: string
          description: 授業名 (en)
        grades:
          type: string
          description: 配当年次
        credit:
          type: integer
          description: 単位数
        facultyNames:
          type: string
          description: 担当教員名
        practicalHomeFacultyCategory:
          type: string
          description: 実務家教員区分
        multiplePersonTeachingForm:
          type: string
          description: 複数人担当形式
        teachingForm:
          type: string
          description: 授業形態
        summary:
          type: string
          description: 授業の概要
        learningOutcomes:
          type: string
          description: 授業の到達目標
        assignments:
          type: string
          description: 提出課題等
        evaluationMethod:
          type: string
          description: 成績の評価方法・基準
        textbooks:
          type: string
          description: テキスト
        referenceBooks:
          type: string
          description: 参考書
        prerequisites:
          type: string
          description: 履修条件
        preLearning:
          type: string
          description: 事前学習
        postLearning:
          type: string
          description: 事後学習
        notes:
          type: string
          description: 履修上の留意点
        keywords:
          type: string
          description: キーワード
        targetCourses:
          type: string
          description: 対象コース・領域
        targetAreas:
          type: string
          description: 対象領域
        classifications:
          type: string
          description: 科目群・科目区分
        teachingLanguage:
          type: string
          description: 教授言語
        contentsAndSchedule:
          type: string
          description: 授業内容とスケジュール
        teachingAndExamForm:
          type: string
          description: 授業・試験の形式
        dsopSubject:
          type: string
          description: DSOP対象科目
    TimetableItem:
      type: object
      required:
        - id
        - subject
        - rooms
      properties:
        id:
          type: string
        subject:
          $ref: '#/components/schemas/Subject'
        slot:
          allOf:
            - $ref: '#/components/schemas/DottoFoundationV1.TimetableSlot'
          description: 集中講義など、時間割に含まれていない場合はnull
        rooms:
          type: array
          items:
            $ref: '#/components/schemas/Room'
    TimetableItemRequest:
      type: object
      required:
        - subjectId
        - roomIds
      properties:
        subjectId:
          type: string
        slot:
          $ref: '#/components/schemas/DottoFoundationV1.TimetableSlot'
        roomIds:
          type: array
          items:
            type: string
