openapi: 3.1.0
info:
  title: Academic Service
  version: 1.0.0
tags:
  - name: CourseRegistrations
  - name: Faculties
  - name: PersonalCalendarItems
  - name: NotifyIrregularities
  - name: CancelledClasses
  - name: MakeupClasses
  - name: RoomChanges
  - name: Rooms
  - name: Reservations
  - name: Subjects
  - name: Syllabus
  - name: TimetableItems
paths:
  /v1/cancelledClasses:
    get:
      operationId: CancelledClassesV1_list
      description: 休講一覧を取得する
      parameters:
        - name: subjectIds
          in: query
          required: false
          description: 科目IDのリスト; 指定した科目の休講のみを取得する; 指定しない場合は全科目を検索対象とする
          schema:
            type: array
            items:
              type: string
          explode: false
        - name: from
          in: query
          required: false
          description: 検索対象開始日付
          schema:
            type: string
            format: date
          explode: false
        - name: until
          in: query
          required: false
          description: 検索対象終了日付
          schema:
            type: string
            format: date
          explode: false
      responses:
        '200':
          description: 休講のリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  cancelledClasses:
                    type: array
                    items:
                      $ref: '#/components/schemas/CancelledClass'
                required:
                  - cancelledClasses
      tags:
        - CancelledClasses
    post:
      operationId: CancelledClassesV1_create
      description: 休講を作成する
      parameters: []
      responses:
        '201':
          description: 作成された休講
          content:
            application/json:
              schema:
                type: object
                properties:
                  cancelledClass:
                    $ref: '#/components/schemas/CancelledClass'
                required:
                  - cancelledClass
      tags:
        - CancelledClasses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelledClassRequest'
        description: 作成する休講の情報
    put:
      operationId: CancelledClassesV1_fetch
      description: 教務システムから休講を取得する
      parameters: []
      responses:
        '200':
          description: 新たに取得された休講
          content:
            application/json:
              schema:
                type: object
                properties:
                  cancelledClasses:
                    type: array
                    items:
                      $ref: '#/components/schemas/CancelledClass'
                required:
                  - cancelledClasses
      tags:
        - CancelledClasses
  /v1/cancelledClasses/{id}:
    delete:
      operationId: CancelledClassesV1_delete
      description: 休講を削除する
      parameters:
        - name: id
          in: path
          required: true
          description: 休講ID
          schema:
            type: string
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
        '404':
          description: The server cannot find the requested resource.
      tags:
        - CancelledClasses
  /v1/courseRegistrations:
    get:
      operationId: CourseRegistrationsV1_list
      description: 履修情報を取得する
      parameters:
        - name: userId
          in: query
          required: true
          description: ユーザーID
          schema:
            type: string
          explode: false
        - name: year
          in: query
          required: false
          description: 開講年度; 指定しない場合は今年度が選択される
          schema:
            type: integer
          explode: false
        - name: semesters
          in: query
          required: true
          description: 開講時期; 指定された時期に開講される全ての科目が取得される
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DottoFoundationV1.CourseSemester'
          explode: false
      responses:
        '200':
          description: 履修情報のリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  courseRegistrations:
                    type: array
                    items:
                      $ref: '#/components/schemas/CourseRegistration'
                required:
                  - courseRegistrations
        '404':
          description: The server cannot find the requested resource.
      tags:
        - CourseRegistrations
    post:
      operationId: CourseRegistrationsV1_create
      description: 履修情報を作成する
      parameters: []
      responses:
        '201':
          description: 作成された履修情報
          content:
            application/json:
              schema:
                type: object
                properties:
                  courseRegistration:
                    $ref: '#/components/schemas/CourseRegistration'
                required:
                  - courseRegistration
        '400':
          description: The server could not understand the request due to invalid syntax.
      tags:
        - CourseRegistrations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseRegistrationRequest'
        description: 作成する履修情報の情報
  /v1/courseRegistrations/{id}:
    delete:
      operationId: CourseRegistrationsV1_delete
      description: 履修情報を削除する
      parameters:
        - name: id
          in: path
          required: true
          description: 履修情報ID
          schema:
            type: string
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
        '404':
          description: The server cannot find the requested resource.
      tags:
        - CourseRegistrations
  /v1/faculties:
