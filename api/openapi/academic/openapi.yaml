        '404':
          description: The server cannot find the requested resource.
      tags:
        - Faculties
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FacultyRequest'
        description: 更新する教員の情報
    delete:
      operationId: FacultiesV1_delete
      description: 教員を削除する
      parameters:
        - name: id
          in: path
          required: true
          description: 教員ID
          schema:
            type: string
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
        '404':
          description: The server cannot find the requested resource.
      tags:
        - Faculties
