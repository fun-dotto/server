  /v1/notifyIrregularities:
    post:
      operationId: NotifyIrregularitiesV1_notify
      description: |-
        指定した日付に発生している時間割の変更を通知する
        休講・補講・教室変更・振替授業
      parameters:
        - name: userIds
          in: query
          required: false
          description: ユーザーIDのリスト; 指定しない場合は全ユーザーに通知する
          schema:
            type: array
            items:
              type: string
          explode: false
        - name: date
          in: query
          required: true
          description: 対象の日付
          schema:
            type: string
            format: date
          explode: false
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
      tags:
        - NotifyIrregularities
  /v1/personalCalendarItems:
    get:
      operationId: PersonalCalendarItemsV1_list
      description: 個人カレンダーアイテム一覧を取得する
      parameters:
        - name: userId
          in: query
          required: true
          description: ユーザーID
          schema:
            type: string
          explode: false
        - name: dates
          in: query
          required: true
          description: 日付のリスト; 指定した日付の個人カレンダーアイテムのみを取得する
          schema:
            type: array
            items:
              type: string
              format: date
          explode: false
      responses:
        '200':
          description: 個人カレンダーアイテムのリスト; 時間割、履修情報、休講補講、振替授業日情報から構築される
          content:
            application/json:
              schema:
                type: object
                properties:
                  personalCalendarItems:
                    type: array
                    items:
                      $ref: '#/components/schemas/PersonalCalendarItem'
                required:
                  - personalCalendarItems
      tags:
        - PersonalCalendarItems
  /v1/reservations:
    get:
      operationId: ReservationsV1_list
      description: |-
        教室の予約一覧を取得する
        検索対象期間に一部でも重複する予約が取得される
      parameters:
        - name: roomIds
          in: query
          required: false
          description: 教室IDのリスト
          schema:
            type: array
            items:
              type: string
          explode: false
        - name: from
          in: query
          required: false
          description: 検索対象開始日時
          schema:
            type: string
            format: date-time
          explode: false
        - name: until
          in: query
          required: false
          description: 検索対象終了日時
          schema:
            type: string
            format: date-time
          explode: false
      responses:
        '200':
          description: 予約のリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  reservations:
                    type: array
                    items:
                      $ref: '#/components/schemas/Reservation'
                required:
                  - reservations
      tags:
        - Reservations
    post:
      operationId: ReservationsV1_create
      description: 教室を予約する
      parameters: []
      responses:
        '201':
          description: 作成された予約
          content:
            application/json:
              schema:
                type: object
                properties:
                  reservation:
                    $ref: '#/components/schemas/Reservation'
                required:
                  - reservation
      tags:
        - Reservations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservationRequest'
        description: 予約する教室の情報
  /v1/reservations/{id}:
    get:
      operationId: ReservationsV1_detail
      description: 予約を詳細取得する
      parameters:
        - name: id
          in: path
          required: true
          description: 予約ID
          schema:
            type: string
      responses:
