openapi: 3.1.0
info:
  title: Admin BFF Service
  version: 1.0.0
tags:
  - name: Announcements
  - name: CourseRegistrations
  - name: Faculties
  - name: PersonalCalendarItems
  - name: CancelledClasses
  - name: Notifications
  - name: MakeupClasses
  - name: RoomChanges
  - name: Rooms
  - name: Reservations
  - name: Subjects
  - name: TimetableItems
  - name: Users
  - name: FCM Tokens
  - name: MenuItems
  - name: FacultyRooms
paths:
  /v1/announcements:
    get:
      operationId: AnnouncementsV1_list
      parameters: []
      responses:
        '200':
          description: おしらせのリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  announcements:
                    type: array
                    items:
                      $ref: '#/components/schemas/AnnouncementService.Announcement'
                required:
                  - announcements
        '401':
          description: Access is unauthorized.
      tags:
        - Announcements
    post:
      operationId: AnnouncementsV1_create
      description: おしらせを作成する
      parameters: []
      responses:
        '201':
          description: 作成されたおしらせ
          content:
            application/json:
              schema:
                type: object
                properties:
                  announcement:
                    $ref: '#/components/schemas/AnnouncementService.Announcement'
                required:
                  - announcement
        '401':
          description: Access is unauthorized.
      tags:
        - Announcements
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnouncementService.AnnouncementRequest'
        description: 作成するおしらせの情報
  /v1/announcements/{id}:
    get:
      operationId: AnnouncementsV1_detail
      description: おしらせを詳細取得する
      parameters:
        - name: id
          in: path
          required: true
          description: おしらせID
          schema:
            type: string
      responses:
        '200':
          description: おしらせの詳細
          content:
            application/json:
              schema:
                type: object
                properties:
                  announcement:
                    $ref: '#/components/schemas/AnnouncementService.Announcement'
                required:
                  - announcement
        '401':
          description: Access is unauthorized.
        '404':
          description: The server cannot find the requested resource.
      tags:
        - Announcements
    put:
      operationId: AnnouncementsV1_update
      description: おしらせを更新する
      parameters:
        - name: id
          in: path
          required: true
          description: おしらせID
          schema:
            type: string
      responses:
        '200':
          description: 更新されたおしらせ
          content:
            application/json:
              schema:
                type: object
                properties:
                  announcement:
                    $ref: '#/components/schemas/AnnouncementService.Announcement'
                required:
                  - announcement
        '401':
          description: Access is unauthorized.
        '404':
          description: The server cannot find the requested resource.
      tags:
        - Announcements
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnouncementService.AnnouncementRequest'
        description: 更新するおしらせの情報
    delete:
      operationId: AnnouncementsV1_delete
      description: おしらせを削除する
      parameters:
        - name: id
          in: path
          required: true
          description: おしらせID
          schema:
            type: string
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
        '401':
          description: Access is unauthorized.
        '404':
          description: The server cannot find the requested resource.
      tags:
        - Announcements
  /v1/cancelledClasses:
    get:
      operationId: CancelledClassesV1_list
      description: 休講一覧を取得する
      parameters:
        - name: subjectIds
          in: query
          required: false
          description: 科目IDのリスト; 指定した科目の休講のみを取得する; 指定しない場合は全科目を検索対象とする
          schema:
            type: array
            items:
              type: string
          explode: false
        - name: from
          in: query
          required: false
          description: 検索対象開始日付
          schema:
            type: string
            format: date
        - name: until
          in: query
          required: false
          description: 検索対象終了日付
          schema:
            type: string
            format: date
      responses:
        '200':
          description: 休講のリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  cancelledClasses:
                    type: array
                    items:
                      $ref: '#/components/schemas/AcademicService.CancelledClass'
                required:
                  - cancelledClasses
        '401':
          description: Access is unauthorized.
      tags:
        - CancelledClasses
    post:
      operationId: CancelledClassesV1_create
      description: 休講を作成する
      parameters: []
      responses:
        '201':
          description: 作成された休講
          content:
            application/json:
              schema:
                type: object
                properties:
                  cancelledClass:
                    $ref: '#/components/schemas/AcademicService.CancelledClass'
                required:
                  - cancelledClass
        '401':
          description: Access is unauthorized.
      tags:
        - CancelledClasses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcademicService.CancelledClassRequest'
        description: 作成する休講の情報
  /v1/cancelledClasses/{id}:
    delete:
      operationId: CancelledClassesV1_delete
      description: 休講を削除する
      parameters:
        - name: id
          in: path
          required: true
          description: 休講ID
          schema:
            type: string
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
        '401':
          description: Access is unauthorized.
        '404':
          description: The server cannot find the requested resource.
      tags:
        - CancelledClasses
  /v1/courseRegistrations:
    get:
      operationId: CourseRegistrationsV1_list
      description: 履修情報を取得する
      parameters:
        - name: userId
          in: query
          required: true
          description: ユーザーID
          schema:
            type: string
          explode: false
        - name: year
          in: query
          required: false
          description: 開講年度; 指定しない場合は今年度が選択される
          schema:
            type: integer
          explode: false
        - name: semesters
          in: query
          required: true
          description: 開講時期
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DottoFoundationV1.CourseSemester'
          explode: false
      responses:
        '200':
          description: 履修情報のリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  registrations:
                    type: array
                    items:
                      $ref: '#/components/schemas/AcademicService.CourseRegistration'
                required:
                  - registrations
        '401':
          description: Access is unauthorized.
      tags:
        - CourseRegistrations
    post:
      operationId: CourseRegistrationsV1_create
      description: 履修情報を作成する
      parameters: []
      responses:
        '201':
          description: 作成された履修情報
          content:
            application/json:
              schema:
                type: object
                properties:
                  registration:
                    $ref: '#/components/schemas/AcademicService.CourseRegistration'
                required:
                  - registration
        '401':
          description: Access is unauthorized.
      tags:
        - CourseRegistrations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcademicService.CourseRegistrationRequest'
        description: 作成する履修情報の情報
  /v1/courseRegistrations/{id}:
    delete:
      operationId: CourseRegistrationsV1_delete
      description: 履修情報を削除する
      parameters:
        - name: id
          in: path
          required: true
          description: 履修情報ID
          schema:
            type: string
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
        '401':
          description: Access is unauthorized.
        '404':
          description: The server cannot find the requested resource.
      tags:
        - CourseRegistrations
  /v1/faculties:
    get:
      operationId: FacultiesV1_list
      description: 教員一覧を取得する
      parameters:
        - name: q
          in: query
          required: false
          description: 検索ワード; 教員の名前で部分一致検索される
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: 教員のリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  faculties:
                    type: array
                    items:
                      $ref: '#/components/schemas/AcademicService.Faculty'
                required:
                  - faculties
        '401':
          description: Access is unauthorized.
      tags:
        - Faculties
    post:
      operationId: FacultiesV1_create
      description: 教員を作成する
      parameters: []
      responses:
        '201':
          description: 作成された教員
          content:
            application/json:
              schema:
                type: object
                properties:
                  faculty:
                    $ref: '#/components/schemas/AcademicService.Faculty'
                required:
                  - faculty
        '401':
          description: Access is unauthorized.
      tags:
        - Faculties
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcademicService.FacultyRequest'
        description: 作成する教員の情報
  /v1/faculties/{id}:
    get:
      operationId: FacultiesV1_detail
      description: 教員を詳細取得する
      parameters:
        - name: id
          in: path
          required: true
          description: 教員ID
          schema:
            type: string
      responses:
        '200':
          description: 教員の詳細
          content:
            application/json:
              schema:
                type: object
                properties:
                  faculty:
                    $ref: '#/components/schemas/AcademicService.Faculty'
                required:
                  - faculty
        '401':
          description: Access is unauthorized.
        '404':
          description: The server cannot find the requested resource.
      tags:
        - Faculties
    put:
      operationId: FacultiesV1_update
      description: 教員を更新する
      parameters:
        - name: id
          in: path
          required: true
          description: 教員ID
          schema:
            type: string
      responses:
        '200':
          description: 更新された教員
          content:
            application/json:
              schema:
                type: object
                properties:
                  faculty:
                    $ref: '#/components/schemas/AcademicService.Faculty'
                required:
                  - faculty
        '401':
          description: Access is unauthorized.
        '404':
          description: The server cannot find the requested resource.
      tags:
        - Faculties
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcademicService.FacultyRequest'
        description: 更新する教員の情報
    delete:
      operationId: FacultiesV1_delete
      description: 教員を削除する
      parameters:
        - name: id
          in: path
          required: true
          description: 教員ID
          schema:
            type: string
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
        '401':
          description: Access is unauthorized.
        '404':
          description: The server cannot find the requested resource.
        '409':
          description: The request conflicts with the current state of the server.
      tags:
        - Faculties
  /v1/facultyRooms:
    get:
      operationId: FacultyRoomsV1_list
      description: 教員室を取得する
      parameters:
        - name: year
          in: query
          required: false
          description: 年度; 指定しない場合は今年度が選択される
          schema:
            type: integer
          explode: false
      responses:
        '200':
          description: 教員室のリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  facultyRooms:
                    type: array
                    items:
                      $ref: '#/components/schemas/AcademicService.FacultyRoom'
                required:
                  - facultyRooms
        '401':
          description: Access is unauthorized.
      tags:
        - FacultyRooms
    post:
      operationId: FacultyRoomsV1_create
      description: |-
        教員室を追加する

        同一年度で同じ教員または同じ教室が既に登録されている場合は409を返す。
      parameters: []
      responses:
        '201':
          description: 作成された教員室
          content:
            application/json:
              schema:
                type: object
                properties:
                  facultyRoom:
                    $ref: '#/components/schemas/AcademicService.FacultyRoom'
                required:
                  - facultyRoom
        '401':
          description: Access is unauthorized.
        '409':
          description: The request conflicts with the current state of the server.
      tags:
        - FacultyRooms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcademicService.FacultyRoomRequest'
        description: 追加する教員室の情報
  /v1/facultyRooms/{id}:
    delete:
      operationId: FacultyRoomsV1_delete
      description: 教員室を削除する
      parameters:
        - name: id
          in: path
          required: true
          description: 教員室ID
          schema:
            type: string
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
        '401':
          description: Access is unauthorized.
        '404':
          description: The server cannot find the requested resource.
      tags:
        - FacultyRooms
  /v1/fcmTokens:
    get:
      operationId: FCMTokenV1_list
      description: FCMトークンの一覧を取得する
      parameters:
        - name: userIds
          in: query
          required: false
          description: ユーザーIDの一覧
          schema:
            type: array
            items:
              type: string
          explode: false
        - name: tokens
          in: query
          required: false
          description: FCMトークンの一覧
          schema:
            type: array
            items:
              type: string
          explode: false
        - name: updatedAtFrom
          in: query
          required: false
          description: 更新日時の開始日時 (updatedAt >= updatedAtFrom)
          schema:
            type: string
            format: date-time
        - name: updatedAtTo
          in: query
          required: false
          description: 更新日時の終了日時 (updatedAt <= updatedAtTo)
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: FCMトークンの一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  fcmTokens:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserService.FCMToken'
                required:
                  - fcmTokens
        '401':
          description: Access is unauthorized.
      tags:
        - FCM Tokens
    post:
      operationId: FCMTokenV1_upsert
      description: |-
        FCMトークンを作成または更新する
        存在しない場合は作成し、存在する場合は更新日時を更新する
      parameters: []
      responses:
        '200':
          description: 作成または更新されたFCMトークン
          content:
            application/json:
              schema:
                type: object
                properties:
                  fcmToken:
                    $ref: '#/components/schemas/UserService.FCMToken'
                required:
                  - fcmToken
        '401':
          description: Access is unauthorized.
      tags:
        - FCM Tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserService.FCMTokenRequest'
        description: 作成または更新するFCMトークンの情報
  /v1/makeupClasses:
    get:
      operationId: MakeupClassesV1_list
      description: 補講一覧を取得する
      parameters:
        - name: subjectIds
          in: query
          required: false
          description: 科目IDのリスト; 指定した科目の補講のみを取得する; 指定しない場合は全科目を検索対象とする
          schema:
            type: array
            items:
              type: string
          explode: false
        - name: from
          in: query
          required: false
          description: 検索対象開始日付
          schema:
            type: string
            format: date
        - name: until
          in: query
          required: false
          description: 検索対象終了日付
          schema:
            type: string
            format: date
      responses:
        '200':
          description: 補講のリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  makeupClasses:
                    type: array
                    items:
                      $ref: '#/components/schemas/AcademicService.MakeupClass'
                required:
                  - makeupClasses
        '401':
          description: Access is unauthorized.
      tags:
        - MakeupClasses
    post:
      operationId: MakeupClassesV1_create
      description: 補講を作成する
      parameters: []
      responses:
        '201':
          description: 作成された補講
          content:
            application/json:
              schema:
                type: object
                properties:
                  makeupClass:
                    $ref: '#/components/schemas/AcademicService.MakeupClass'
                required:
                  - makeupClass
        '401':
          description: Access is unauthorized.
      tags:
        - MakeupClasses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcademicService.MakeupClassRequest'
        description: 作成する補講の情報
  /v1/makeupClasses/{id}:
    delete:
      operationId: MakeupClassesV1_delete
      description: 補講を削除する
      parameters:
        - name: id
          in: path
          required: true
          description: 補講ID
          schema:
            type: string
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
        '401':
          description: Access is unauthorized.
        '404':
          description: The server cannot find the requested resource.
      tags:
        - MakeupClasses
  /v1/menuItems:
    get:
      operationId: MenuItemsV1_list
      description: メニューを取得する
      parameters:
        - name: date
          in: query
          required: true
          description: メニューを取得する日付
          schema:
            type: string
            format: date
      responses:
        '200':
          description: メニューのリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  menuItems:
                    type: array
                    items:
                      $ref: '#/components/schemas/FunchService.MenuItem'
                required:
                  - menuItems
        '401':
          description: Access is unauthorized.
      tags:
        - MenuItems
    post:
      operationId: MenuItemsV1_create
      description: メニューを作成する
      parameters: []
      responses:
        '201':
          description: 作成されたメニュー
          content:
            application/json:
              schema:
                type: object
                properties:
                  menuItem:
                    $ref: '#/components/schemas/FunchService.MenuItem'
                required:
                  - menuItem
        '401':
          description: Access is unauthorized.
      tags:
        - MenuItems
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FunchService.MenuItemRequest'
        description: 作成するメニューの情報
  /v1/notifications:
    get:
      operationId: NotificationV1_list
      description: 通知の一覧を取得する
      parameters:
        - name: notifyAtFrom
          in: query
          required: false
          description: '通知予定期間の開始日時（通知ウィンドウがこの範囲と重なるものを抽出: notifyBefore >= notifyAtFrom）'
          schema:
            type: string
            format: date-time
        - name: notifyAtTo
          in: query
          required: false
          description: '通知予定期間の終了日時（通知ウィンドウがこの範囲と重なるものを抽出: notifyAfter <= notifyAtTo）'
          schema:
            type: string
            format: date-time
        - name: isNotified
          in: query
          required: false
          description: '通知済みかどうか (true: 通知済みの通知のみ、false: 通知未済みの通知のみ、指定なし: 全ての通知)'
          schema:
            type: boolean
          explode: false
      responses:
        '200':
          description: 通知の一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  notifications:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserService.Notification'
                required:
                  - notifications
        '401':
          description: Access is unauthorized.
      tags:
        - Notifications
    post:
      operationId: NotificationV1_create
      description: |-
        通知を作成する
        存在しない場合は作成し、存在する場合は更新日時を更新する
      parameters: []
      responses:
        '201':
          description: 作成された通知
          content:
            application/json:
              schema:
                type: object
                properties:
                  notification:
                    $ref: '#/components/schemas/UserService.Notification'
                required:
                  - notification
        '401':
          description: Access is unauthorized.
      tags:
        - Notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserService.NotificationRequest'
        description: 作成する通知の情報
  /v1/notifications/dispatch:
    post:
      operationId: NotificationV1_dispatch
      description: |-
        指定したIDの通知を、送信状態や送信可能期間に関わらずまとめて送信する

        `notificationIds` が空配列の場合は `400 Bad Request` を返す。
        存在しないIDが含まれる場合でもエラーにはせず、送信に成功した通知のみをレスポンスに含める。
      parameters: []
      responses:
        '200':
          description: 送信に成功した通知の一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  notifications:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserService.Notification'
                required:
                  - notifications
        '400':
          description: The server could not understand the request due to invalid syntax.
        '401':
          description: Access is unauthorized.
      tags:
        - Notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                notificationIds:
                  type: array
                  items:
                    type: string
              required:
                - notificationIds
        description: 送信対象の通知IDリスト
  /v1/notifications/{id}:
    put:
      operationId: NotificationV1_update
      description: 通知を更新する
      parameters:
        - name: id
          in: path
          required: true
          description: 通知ID
          schema:
            type: string
      responses:
        '200':
          description: 更新された通知
          content:
            application/json:
              schema:
                type: object
                properties:
                  notification:
                    $ref: '#/components/schemas/UserService.Notification'
                required:
                  - notification
        '401':
          description: Access is unauthorized.
        '404':
          description: The server cannot find the requested resource.
      tags:
        - Notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserService.NotificationRequest'
        description: 更新する通知の情報
    delete:
      operationId: NotificationV1_delete
      description: 通知を削除する
      parameters:
        - name: id
          in: path
          required: true
          description: 通知ID
          schema:
            type: string
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
        '401':
          description: Access is unauthorized.
        '404':
          description: The server cannot find the requested resource.
      tags:
        - Notifications
  /v1/personalCalendarItems:
    get:
      operationId: PersonalCalendarItemsV1_list
