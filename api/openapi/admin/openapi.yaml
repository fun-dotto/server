    UserService.Notification:
      type: object
      required:
        - id
        - title
        - body
        - notifyAfter
        - notifyBefore
        - targetUsers
      properties:
        id:
          type: string
          description: 通知ID
        title:
          type: string
          description: 通知タイトル
        body:
          type: string
          description: 通知本文
        imageUrl:
          type: string
          description: 通知に表示する画像のURL
        analyticsLabel:
          type: string
          description: |-
            Firebase Analytics に記録する分析ラベル

            通知の開封率計測などに利用
        apnsBadge:
          type: integer
          description: |-
            APNs のバッジ数

            アプリアイコンに表示される数値。0 でバッジを消去
        apnsSound:
          type: string
          description: |-
            APNs の通知音

            - "default": OS 標準の通知音
            - "" または省略: 無音
            - 任意のファイル名（例: "alert.caf"）: アプリバンドルまたは Library/Sounds/ に同梱されたカスタムサウンド
            対応フォーマットは .caf / .aiff / .wav（Linear PCM, MA4, µ-law, a-law）、最大30秒
        apnsContentAvailable:
          type: boolean
          description: |-
            APNs の content-available フラグ

            true でサイレントプッシュ（バックグラウンド更新）になる
        androidChannelId:
          type: string
          description: |-
            Android の通知チャンネルID

            Android 8.0 以降、通知はチャンネル単位で管理される
        androidPriority:
          type: string
          description: |-
            Android の通知優先度

            "normal" または "high"。"high" は即時配信される
        androidTtlSeconds:
          type: integer
          description: |-
            Android の通知TTL（秒）

            FCM がメッセージを保持する最大時間。期限切れで破棄される
        webpushLink:
          type: string
          description: Web Push 通知をクリックした際に開くURL
        url:
          type: string
          description: |-
            通知をタップした時に開くURL
            アプリを開くのみの場合は未指定
        notifyAfter:
          type: string
          format: date-time
          description: 通知送信可能になる日時（この時刻以降に送信対象となる）
        notifyBefore:
          type: string
          format: date-time
          description: 通知送信期限日時（この時刻を過ぎた場合は送信しない）
        targetUsers:
          type: array
          items:
            $ref: '#/components/schemas/UserService.NotificationTargetUser'
          description: 対象ユーザーのリスト
    UserService.NotificationRequest:
      type: object
      required:
        - title
        - body
        - notifyAfter
        - notifyBefore
        - targetUserIds
      properties:
        title:
          type: string
          description: 通知タイトル
        body:
          type: string
          description: 通知本文
        imageUrl:
          type: string
          description: 通知に表示する画像のURL
        analyticsLabel:
          type: string
          description: Firebase Analytics に記録する分析ラベル
        apnsBadge:
          type: integer
          description: APNs のバッジ数
        apnsSound:
          type: string
          description: |-
            APNs の通知音

            - "default": OS 標準の通知音
            - "" または省略: 無音
            - 任意のファイル名（例: "alert.caf"）: アプリバンドルまたは Library/Sounds/ に同梱されたカスタムサウンド
            対応フォーマットは .caf / .aiff / .wav（Linear PCM, MA4, µ-law, a-law）、最大30秒
        apnsContentAvailable:
          type: boolean
          description: APNs の content-available フラグ（true でサイレントプッシュ）
        androidChannelId:
          type: string
          description: Android の通知チャンネルID
        androidPriority:
          type: string
          description: Android の通知優先度（"normal" または "high"）
        androidTtlSeconds:
          type: integer
          description: Android の通知TTL（秒）
        webpushLink:
          type: string
          description: Web Push 通知をクリックした際に開くURL
        url:
          type: string
          description: |-
            通知をタップした時に開くURL
            アプリを開くのみの場合は未指定
        notifyAfter:
          type: string
          format: date-time
          description: 通知送信可能になる日時（この時刻以降に送信対象となる）
        notifyBefore:
          type: string
          format: date-time
          description: 通知送信期限日時（この時刻を過ぎた場合は送信しない）
        targetUserIds:
          type: array
          items:
            type: string
          description: 対象ユーザーIDのリスト
    UserService.NotificationTargetUser:
      type: object
      required:
        - userId
