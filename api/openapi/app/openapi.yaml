          $ref: '#/components/schemas/Size'
        price:
          type: integer
          format: int32
    Reservation:
      type: object
      required:
        - id
        - room
        - startAt
        - endAt
        - title
      properties:
        id:
          type: string
        room:
          $ref: '#/components/schemas/Room'
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        title:
          type: string
    Room:
      type: object
