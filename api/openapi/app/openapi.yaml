      type: string
      enum:
        - Small
        - Medium
        - Large
    SubjectDetail:
      type: object
      required:
        - id
        - name
        - faculties
        - year
        - semester
        - credit
        - eligibleAttributes
        - requirements
        - syllabus
      properties:
        id:
          type: string
        name:
          type: string
