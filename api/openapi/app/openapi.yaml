openapi: 3.1.0
info:
  title: App BFF Service
  version: 1.0.0
tags:
  - name: Announcements
  - name: CourseRegistrations
  - name: PersonalCalendarItems
  - name: CancelledClasses
  - name: MakeupClasses
  - name: RoomChanges
  - name: Subjects
  - name: TimetableItems
  - name: Users
  - name: FCM Tokens
  - name: MenuItems
  - name: Reservations
paths:
  /v1/announcements:
    get:
      operationId: AnnouncementsV1_list
      parameters: []
      responses:
        '200':
          description: おしらせのリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  announcements:
                    type: array
                    items:
                      $ref: '#/components/schemas/Announcement'
                required:
                  - announcements
        '401':
          description: Access is unauthorized.
      tags:
        - Announcements
  /v1/cancelledClasses:
    get:
      operationId: CancelledClassesV1_list
      description: 休講一覧を取得する
      parameters:
        - name: subjectIds
          in: query
          required: false
          description: 科目IDのリスト; 指定した科目の休講のみを取得する; 指定しない場合は全科目を検索対象とする
          schema:
            type: array
            items:
              type: string
          explode: false
        - name: from
          in: query
          required: false
          description: 検索対象開始日付
          schema:
            type: string
            format: date
        - name: until
          in: query
          required: false
          description: 検索対象終了日付
          schema:
            type: string
            format: date
      responses:
        '200':
          description: 休講のリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  cancelledClasses:
                    type: array
                    items:
                      $ref: '#/components/schemas/CancelledClass'
                required:
                  - cancelledClasses
        '401':
          description: Access is unauthorized.
      tags:
        - CancelledClasses
      security:
        - BearerAuth: []
          FirebaseAppCheckAuth: []
  /v1/courseRegistrations:
    get:
      operationId: CourseRegistrationsV1_list
      description: 履修情報を取得する
      parameters:
        - name: year
          in: query
          required: false
          description: 開講年度; 指定しない場合は今年度が選択される
          schema:
            type: integer
          explode: false
        - name: semesters
          in: query
          required: true
          description: 開講時期
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DottoFoundationV1.CourseSemester'
          explode: false
      responses:
        '200':
          description: 履修情報のリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  courseRegistrations:
                    type: array
                    items:
                      $ref: '#/components/schemas/CourseRegistration'
                required:
                  - courseRegistrations
        '401':
          description: Access is unauthorized.
      tags:
        - CourseRegistrations
      security:
        - BearerAuth: []
          FirebaseAppCheckAuth: []
    post:
      operationId: CourseRegistrationsV1_create
      description: 履修情報を作成する
      parameters: []
      responses:
        '201':
          description: 作成された履修情報
          content:
            application/json:
              schema:
                type: object
                properties:
                  courseRegistration:
                    $ref: '#/components/schemas/CourseRegistration'
                required:
                  - courseRegistration
        '401':
          description: Access is unauthorized.
      tags:
        - CourseRegistrations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseRegistrationRequest'
        description: 作成する履修情報の情報
      security:
        - BearerAuth: []
          FirebaseAppCheckAuth: []
  /v1/courseRegistrations/{id}:
    delete:
      operationId: CourseRegistrationsV1_delete
      description: 履修情報を削除する
      parameters:
        - name: id
          in: path
          required: true
          description: 履修情報ID
          schema:
            type: string
      responses:
        '204':
          description: There is no content to send for this request, but the headers may be useful.
        '401':
          description: Access is unauthorized.
        '404':
          description: The server cannot find the requested resource.
      tags:
        - CourseRegistrations
      security:
        - BearerAuth: []
          FirebaseAppCheckAuth: []
  /v1/fcmTokens:
    post:
      operationId: FCMTokenV1_upsert
      description: |-
        FCMトークンを作成または更新する
        存在しない場合は作成し、存在する場合は更新日時を更新する
      parameters: []
      responses:
        '200':
          description: 作成または更新されたFCMトークン
          content:
            application/json:
              schema:
                type: object
                properties:
                  fcmToken:
                    $ref: '#/components/schemas/FCMToken'
                required:
                  - fcmToken
        '401':
          description: Access is unauthorized.
      tags:
        - FCM Tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FCMTokenRequest'
        description: 作成または更新するFCMトークンの情報
      security:
        - BearerAuth: []
          FirebaseAppCheckAuth: []
  /v1/makeupClasses:
    get:
      operationId: MakeupClassesV1_list
      description: 補講一覧を取得する
      parameters:
        - name: subjectIds
          in: query
          required: false
          description: 科目IDのリスト; 指定した科目の補講のみを取得する; 指定しない場合は全科目を検索対象とする
          schema:
            type: array
            items:
              type: string
          explode: false
        - name: from
          in: query
          required: false
          description: 検索対象開始日付
          schema:
            type: string
            format: date
        - name: until
          in: query
          required: false
          description: 検索対象終了日付
          schema:
            type: string
            format: date
      responses:
        '200':
          description: 補講のリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  makeupClasses:
                    type: array
                    items:
                      $ref: '#/components/schemas/MakeupClass'
                required:
                  - makeupClasses
        '401':
          description: Access is unauthorized.
      tags:
        - MakeupClasses
      security:
        - BearerAuth: []
          FirebaseAppCheckAuth: []
  /v1/menuItems:
    get:
      operationId: MenuItemsV1_list
      description: メニューを取得する
      parameters:
        - name: date
          in: query
          required: true
          description: メニューを取得する日付
          schema:
            type: string
            format: date
          explode: false
      responses:
        '200':
          description: メニューのリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  menuItems:
                    type: array
                    items:
                      $ref: '#/components/schemas/MenuItem'
                required:
                  - menuItems
        '401':
          description: Access is unauthorized.
      tags:
        - MenuItems
  /v1/personalCalendarItems:
    get:
      operationId: PersonalCalendarItemsV1_list
      description: 個人カレンダーアイテム一覧を取得する
      parameters:
        - name: dates
          in: query
          required: true
          description: 日付のリスト; 指定した日付の個人カレンダーアイテムのみを取得する
          schema:
            type: array
            items:
              type: string
              format: date
          explode: false
      responses:
        '200':
          description: 個人カレンダーアイテムのリスト; 時間割、履修情報、休講補講、振替授業日情報から構築される
          content:
            application/json:
              schema:
                type: object
                properties:
                  personalCalendarItems:
                    type: array
                    items:
                      $ref: '#/components/schemas/PersonalCalendarItem'
                required:
                  - personalCalendarItems
        '401':
          description: Access is unauthorized.
      tags:
        - PersonalCalendarItems
      security:
        - BearerAuth: []
          FirebaseAppCheckAuth: []
  /v1/reservations:
    get:
      operationId: ReservationsV1_list
      description: |-
        教室の予約一覧を取得する
        検索対象期間に一部でも重複する予約が取得される
      parameters:
        - name: roomIds
          in: query
          required: false
          description: 教室IDのリスト
          schema:
            type: array
            items:
              type: string
          explode: false
        - name: from
          in: query
          required: false
          description: 検索対象開始日時
          schema:
            type: string
            format: date-time
        - name: until
          in: query
          required: false
          description: 検索対象終了日時
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: 予約のリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  reservations:
                    type: array
                    items:
                      $ref: '#/components/schemas/Reservation'
                required:
                  - reservations
        '401':
          description: Access is unauthorized.
      tags:
        - Reservations
      security:
        - BearerAuth: []
          FirebaseAppCheckAuth: []
  /v1/roomChanges:
    get:
      operationId: RoomChangesV1_list
      description: 教室変更一覧を取得する
      parameters:
        - name: subjectIds
          in: query
          required: false
          description: 科目IDのリスト; 指定した科目の教室変更のみを取得する; 指定しない場合は全科目を検索対象とする
          schema:
            type: array
            items:
              type: string
          explode: false
        - name: from
          in: query
          required: false
          description: 検索対象開始日付
          schema:
            type: string
            format: date
        - name: until
          in: query
          required: false
          description: 検索対象終了日付
          schema:
            type: string
            format: date
      responses:
        '200':
          description: 教室変更のリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  roomChanges:
                    type: array
                    items:
                      $ref: '#/components/schemas/RoomChange'
                required:
                  - roomChanges
        '401':
          description: Access is unauthorized.
      tags:
        - RoomChanges
      security:
        - BearerAuth: []
          FirebaseAppCheckAuth: []
  /v1/subjects:
    get:
      operationId: SubjectsV1_list
      description: |-
        科目を検索する

        同一項目同士はOR、異なる項目同士はANDでフィルタリングされます。
      parameters:
        - name: q
          in: query
          required: false
          description: 検索ワード
          schema:
            type: string
          explode: false
        - name: grades
          in: query
          required: false
          description: 学年
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DottoFoundationV1.Grade'
          explode: false
        - name: courses
          in: query
          required: false
          description: コース; 大学院の場合は大学院コースに読み替え
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DottoFoundationV1.Course'
          explode: false
        - name: classes
          in: query
          required: false
          description: クラス; 大学院の学年を選択した場合は選択できない
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DottoFoundationV1.Class'
          explode: false
        - name: classifications
          in: query
          required: false
          description: '学部: 専門・教養; 大学院: 専門・研究指導'
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DottoFoundationV1.SubjectClassification'
          explode: false
        - name: semesters
          in: query
          required: false
          description: 開講時期
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DottoFoundationV1.CourseSemester'
          explode: false
        - name: requirementTypes
          in: query
          required: false
          description: 必修・選択・選択必修
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DottoFoundationV1.SubjectRequirementType'
          explode: false
        - name: culturalSubjectCategories
          in: query
          required: false
          description: 教養科目カテゴリ
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DottoFoundationV1.CulturalSubjectCategory'
          explode: false
      responses:
        '200':
          description: 科目のリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  subjects:
                    type: array
                    items:
                      $ref: '#/components/schemas/SubjectSummary'
                required:
                  - subjects
        '401':
          description: Access is unauthorized.
      tags:
        - Subjects
  /v1/subjects/{id}:
    get:
      operationId: SubjectsV1_detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 科目の詳細
          content:
            application/json:
              schema:
                type: object
                properties:
                  subject:
                    $ref: '#/components/schemas/SubjectDetail'
                required:
                  - subject
        '401':
          description: Access is unauthorized.
        '404':
          description: The server cannot find the requested resource.
      tags:
        - Subjects
  /v1/timetableItems:
    get:
      operationId: TimetableItemsV1_list
      description: 時間割を取得する
      parameters:
        - name: year
          in: query
          required: false
          description: 開講年度; 指定しない場合は今年度が選択される
          schema:
            type: integer
          explode: false
        - name: semesters
          in: query
          required: true
          description: 開講時期
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DottoFoundationV1.CourseSemester'
          explode: false
      responses:
        '200':
          description: 時間割のリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  timetableItems:
                    type: array
                    items:
                      $ref: '#/components/schemas/TimetableItem'
                required:
                  - timetableItems
        '401':
          description: Access is unauthorized.
      tags:
        - TimetableItems
  /v1/users:
    get:
      operationId: UsersV1_detail
      description: ユーザーを取得する
      parameters: []
      responses:
        '200':
          description: ユーザーの情報
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/UserInfo'
                required:
                  - user
        '401':
          description: Access is unauthorized.
        '404':
          description: The server cannot find the requested resource.
      tags:
        - Users
      security:
        - BearerAuth: []
          FirebaseAppCheckAuth: []
    post:
      operationId: UsersV1_upsert
      description: ユーザーを作成または更新する
      parameters: []
      responses:
        '200':
          description: 作成または更新されたユーザー
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/UserInfo'
                required:
                  - user
        '401':
          description: Access is unauthorized.
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInfo'
        description: 作成または更新するユーザーの情報
      security:
        - BearerAuth: []
          FirebaseAppCheckAuth: []
security:
  - FirebaseAppCheckAuth: []
components:
  schemas:
    AcademicService.Faculty:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
    AcademicService.SubjectRequirement:
      type: object
      required:
        - course
        - requirementType
      properties:
        course:
          $ref: '#/components/schemas/DottoFoundationV1.Course'
        requirementType:
          $ref: '#/components/schemas/DottoFoundationV1.SubjectRequirementType'
    AcademicService.SubjectTargetClass:
      type: object
      required:
        - grade
      properties:
        grade:
          $ref: '#/components/schemas/DottoFoundationV1.Grade'
        class:
          allOf:
            - $ref: '#/components/schemas/DottoFoundationV1.Class'
          description: 修士課程・博士課程対象の場合はnull
      description: 対象学年・クラス
    AcademicService.Syllabus:
      type: object
      required:
        - id
        - name
        - enName
        - grades
        - credit
        - facultyNames
        - practicalHomeFacultyCategory
        - multiplePersonTeachingForm
        - teachingForm
        - summary
        - learningOutcomes
        - assignments
        - evaluationMethod
        - textbooks
        - referenceBooks
        - prerequisites
        - preLearning
        - postLearning
        - notes
        - keywords
        - targetCourses
        - targetAreas
        - classifications
        - teachingLanguage
        - contentsAndSchedule
        - teachingAndExamForm
        - dsopSubject
      properties:
        id:
          type: string
          description: 教務システムのシラバスID
        name:
          type: string
          description: 授業名
        enName:
          type: string
          description: 授業名 (en)
        grades:
          type: string
          description: 配当年次
        credit:
          type: integer
          description: 単位数
        facultyNames:
          type: string
          description: 担当教員名
        practicalHomeFacultyCategory:
          type: string
          description: 実務家教員区分
        multiplePersonTeachingForm:
          type: string
          description: 複数人担当形式
        teachingForm:
          type: string
          description: 授業形態
        summary:
          type: string
          description: 授業の概要
        learningOutcomes:
          type: string
          description: 授業の到達目標
        assignments:
          type: string
          description: 提出課題等
        evaluationMethod:
          type: string
          description: 成績の評価方法・基準
        textbooks:
          type: string
          description: テキスト
        referenceBooks:
          type: string
          description: 参考書
        prerequisites:
          type: string
          description: 履修条件
        preLearning:
          type: string
          description: 事前学習
        postLearning:
          type: string
          description: 事後学習
        notes:
          type: string
          description: 履修上の留意点
        keywords:
          type: string
          description: キーワード
        targetCourses:
          type: string
          description: 対象コース・領域
        targetAreas:
          type: string
          description: 対象領域
        classifications:
          type: string
          description: 科目群・科目区分
        teachingLanguage:
          type: string
          description: 教授言語
        contentsAndSchedule:
          type: string
          description: 授業内容とスケジュール
        teachingAndExamForm:
          type: string
          description: 授業・試験の形式
        dsopSubject:
          type: string
          description: DSOP対象科目
    Announcement:
      type: object
      required:
        - id
        - title
        - date
        - url
      properties:
        id:
          type: string
        title:
          type: string
        date:
          type: string
          format: date-time
          description: 日時
        url:
          type: string
          format: uri
    CancelledClass:
      type: object
      required:
        - id
        - subject
        - date
        - period
        - comment
      properties:
        id:
          type: string
        subject:
          $ref: '#/components/schemas/SubjectSummary'
        date:
          type: string
          format: date
        period:
          $ref: '#/components/schemas/DottoFoundationV1.Period'
        comment:
          type: string
      description: 休講
    Category:
      type: string
      enum:
        - SetAndSingle
        - BowlAndCurry
        - Noodle
        - Side
        - Dessert
    CourseRegistration:
      type: object
      required:
        - id
        - subject
      properties:
        id:
          type: string
        subject:
          $ref: '#/components/schemas/SubjectSummary'
    CourseRegistrationRequest:
      type: object
      required:
        - subjectId
      properties:
        subjectId:
          type: string
    DottoFoundationV1.Class:
      type: string
      enum:
        - A
        - B
        - C
        - D
        - E
        - F
        - G
        - H
        - I
        - J
        - K
        - L
      description: クラス
    DottoFoundationV1.Course:
      type: string
      enum:
        - InformationSystem
        - InformationDesign
        - AdvancedICT
        - ComplexSystem
        - IntelligentSystem
      description: コース
    DottoFoundationV1.CourseSemester:
      type: string
      enum:
        - AllYear
        - H1
        - H2
        - Q1
        - Q2
        - Q3
        - Q4
        - SummerIntensive
        - WinterIntensive
      description: 開講時期
    DottoFoundationV1.CulturalSubjectCategory:
      type: string
      enum:
        - Society
        - Human
        - Science
        - Health
        - Communication
      description: 教養科目カテゴリ
    DottoFoundationV1.DayOfWeek:
      type: string
      enum:
        - Sunday
        - Monday
        - Tuesday
        - Wednesday
        - Thursday
        - Friday
        - Saturday
    DottoFoundationV1.Floor:
      type: string
      enum:
        - Floor1
        - Floor2
        - Floor3
        - Floor4
        - Floor5
        - Floor6
        - Floor7
        - Virtual
    DottoFoundationV1.Grade:
      type: string
      enum:
        - B1
        - B2
        - B3
        - B4
        - M1
        - M2
        - D1
        - D2
        - D3
      description: 学年
    DottoFoundationV1.Period:
      type: string
      enum:
        - Period1
        - Period2
        - Period3
        - Period4
        - Period5
        - Period6
    DottoFoundationV1.PersonalCalendarItemStatus:
      type: string
      enum:
        - Normal
        - Cancelled
        - Makeup
        - RoomChanged
      description: 教室変更よりも休講・補講が優先される
    DottoFoundationV1.SubjectClassification:
      type: string
      enum:
        - Specialized
        - Cultural
        - ResearchInstruction
      description: 科目カテゴリ
    DottoFoundationV1.SubjectRequirementType:
      type: string
      enum:
        - Required
        - Optional
        - OptionalRequired
      description: 必修・選択
    DottoFoundationV1.TimetableSlot:
      type: object
      required:
        - dayOfWeek
        - period
      properties:
        dayOfWeek:
          $ref: '#/components/schemas/DottoFoundationV1.DayOfWeek'
        period:
          $ref: '#/components/schemas/DottoFoundationV1.Period'
    FCMToken:
      type: object
      required:
        - token
        - createdAt
        - updatedAt
      properties:
        token:
          type: string
          description: FCMトークン
        createdAt:
          type: string
          format: date-time
          description: 作成日時
        updatedAt:
          type: string
          format: date-time
          description: 更新日時
    FCMTokenRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
    Faculty:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
    MakeupClass:
      type: object
      required:
        - id
        - subject
        - date
        - period
        - comment
