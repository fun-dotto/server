        id:
          type: string
        subject:
          $ref: '#/components/schemas/SubjectSummary'
        date:
          type: string
          format: date
        period:
          $ref: '#/components/schemas/DottoFoundationV1.Period'
        comment:
          type: string
      description: 補講
    MenuItem:
      type: object
      required:
        - id
        - date
        - name
        - imageUrl
        - category
        - prices
      properties:
        id:
          type: string
        date:
          type: string
          format: date
        name:
          type: string
        imageUrl:
          type: string
          format: uri
        category:
          $ref: '#/components/schemas/Category'
        prices:
          type: array
          items:
            $ref: '#/components/schemas/Price'
    PersonalCalendarItem:
      type: object
