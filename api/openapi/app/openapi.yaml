        - id
        - name
        - faculties
        - year
        - semester
        - credit
      properties:
        id:
          type: string
        name:
          type: string
        faculties:
          type: array
          items:
            $ref: '#/components/schemas/SubjectFaculty'
        year:
          type: integer
          description: 開講年度
        semester:
          allOf:
            - $ref: '#/components/schemas/DottoFoundationV1.CourseSemester'
          description: 開講時期
        credit:
          type: integer
          description: 単位数
    TimetableItem:
      type: object
