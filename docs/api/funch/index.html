<!doctype html>
<html>
  <head>
    <title>Funch API</title>
    <!-- needed for adaptive design -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://fonts.googleapis.com/css?family=Montserrat:300,400,700|Roboto:300,400,700"
      rel="stylesheet"
    />

    <!--
    Redoc CE doesn't change outer page styles
    -->
    <style>
      body {
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <!--
    Redoc CE element with link to your OpenAPI description
    -->
    <redoc
      spec-url="https://raw.githubusercontent.com/fun-dotto/server/refs/heads/main/api/openapi/funch/openapi.yaml"
    ></redoc>
    <!--
    Link to Redoc CE JavaScript on CDN for rendering standalone element
    -->
    <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"></script>
  </body>
</html>
